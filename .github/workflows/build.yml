name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Static binary and .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0+git.$(git rev-parse --short HEAD)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test ./...

      - name: Build static binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/mysql2ydb \
            ./cmd/mysql2ydb
          file dist/mysql2ydb
          ldd dist/mysql2ydb || true

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_amd64.deb -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build .deb package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          nfpm package \
            --config nfpm.yaml \
            --packager deb \
            --target dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mysql2ydb-linux-amd64
          path: |
            dist/mysql2ydb
            dist/*.deb
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/mysql2ydb \
            dist/*.deb \
            --clobber
